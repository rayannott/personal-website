<!DOCTYPE html>
<html lang="en">

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta name="description" content="Airat Valiullin — Software & Cloud Engineer. Personal business card.">

  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>

  <canvas id="particles-canvas"></canvas>

      <div class="card-glass-blur"></div>
      <div class="card" id="card">

        <!-- Edge glow (sits behind both faces in 3D space) -->
        <div class="card-edge-glow"></div>

        <!-- Front Face -->
        <div class="card-face card-front">
          <div class="holo-overlay"></div>
          <div class="specular-highlight"></div>
          <div class="noise-overlay"></div>
          <div class="card-content">
            <div class="monogram">AV</div>
            <h1 class="name"><span class="initial">A</span>irat <span class="initial">V</span>aliullin</h1>
            <p class="title">Software Engineer</p>
          </div>
          <div class="flip-hint">click to flip</div>
        </div>

        <!-- Back Face -->
        <div class="card-face card-back">
          <div class="noise-overlay"></div>
          <div class="card-content">
            <div class="back-section">
              <h2>Contact</h2>
              <div class="contact-row">

                  <svg class="check-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </button>

            </div>
